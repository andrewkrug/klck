# XcodeGen spec for Klck's App Store builds.
#
# The macOS app can still be built from SwiftPM (`./build_app.sh`) for local
# use — that path is ad-hoc signed and bypasses the sandbox. The targets here
# are specifically for App Store distribution and need Xcode.
#
#   brew install xcodegen      # one-time
#   xcodegen generate          # writes Klck.xcodeproj
#   open Klck.xcodeproj        # build/run on simulator or device
#
# Or use the Makefile: `make ios-project`.

name: Klck
options:
  bundleIdPrefix: com.klck
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  createIntermediateGroups: true

targets:
  Klck-iOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/Klck
      - path: Resources/Assets.xcassets
      - path: Resources/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_NAME: Klck
        PRODUCT_BUNDLE_IDENTIFIER: com.klck.metronome
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Info.plist is synthesized at build time from these INFOPLIST_KEY_*
        # settings — project.yml is the only source of truth, so a linter
        # rewriting Resources/Klck-iOS-Info.plist can no longer drop our keys.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Klck uses the microphone to tune your instrument."
        INFOPLIST_KEY_UIBackgroundModes: "audio"
        INFOPLIST_KEY_UIUserInterfaceStyle: "Dark"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.music"
        # Klck uses no encryption beyond Apple-provided system frameworks, so
        # it qualifies for the standard export-compliance exemption. Declaring
        # this here skips the per-build prompt in App Store Connect.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        # All four orientations — required by Apple for iPad. Layout adapts
        # to horizontalSizeClass, so iPhone landscape still uses the compact
        # layout and iPad picks up the regular (wide DB-66) layout.
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # Paid Apple Developer Individual team — Xcode auto-issues profiles
        # on first `-allowProvisioningUpdates` build.
        DEVELOPMENT_TEAM: S5N6TKYXS6
        CODE_SIGN_STYLE: Automatic

  Klck-macOS:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      # Same shared sources as the iOS target — #if os(macOS) blocks select
      # the AppKit / NSApp paths.
      - path: Sources/Klck
      - path: Resources/Assets-macOS.xcassets
      - path: Resources/PrivacyInfo.xcprivacy
    entitlements:
      path: Resources/Klck-macOS.entitlements
    settings:
      base:
        PRODUCT_NAME: Klck
        # Same bundle ID as iOS so the two can ship under a single App Store
        # listing via Universal Purchase (enable in App Store Connect once
        # both builds are uploaded).
        PRODUCT_BUNDLE_IDENTIFIER: com.klck.metronome
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        # Mac App Store requirements.
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Klck
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Klck uses the microphone to tune your instrument."
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Andrew Krug"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.music"
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        DEVELOPMENT_TEAM: S5N6TKYXS6
        CODE_SIGN_STYLE: Automatic
